plugins {
	id 'java'
	id 'application'
	id 'eclipse'
}

repositories {
	gradlePluginPortal()
	mavenCentral()
}

dependencies {
	implementation 'org.apache.commons:commons-math3:3.6.1'
	implementation 'com.google.guava:guava:29.0-jre'
	
	testImplementation 'junit:junit:4.13'
	implementation fileTree(dir: 'libs', include: ['*.jar'])
}
